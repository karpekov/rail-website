recent_news:

  - date: March 2026
    content: "Georgia Tech's College of Computing featured [Niharika Mathur](https://niharikamathur.com)'s research showing that [explainability is a must for older adults to trust AI](https://www.cc.gatech.edu/news/new-study-shows-explainability-must-older-adults-trust-ai). The work will be presented at [CHI 2026](https://chi2026.acm.org/) in Barcelona."

  - date: March 2026
    content: "Lab alumni [Weiyu Liu](http://weiyuliu.com/) and [Joanne Truong](https://www.joannetruong.com/) are part of [Rhoda AI](https://www.rhoda.ai/), a newly launched robotics startup that exited stealth with a [$450M Series A](https://www.reuters.com/technology/rhoda-ai-raises-450-million-17-billion-valuation-unveils-robot-intelligence-2026-03-10/)."

  - date: December 2025
    content: "[Nadira Mahamane](https://nadira.me)'s paper [Older Adult Perspectives on Home Monitoring Robots: User Preferences and Performance of Robot Observation Strategies](https://dl.acm.org/doi/abs/10.1145/3757279.3785612) was accepted to HRI."

  - date: October 2025
    content: "[Alex Karpekov](https://www.alexkarpekov.com/) presented [VISAR: Visualization and Interpretation of Sensor-based Activity Recognition for Smart Homes](https://dl.acm.org/doi/10.1145/3714394.3756319) at UbiComp."

  - date: July 2025
    content: "[Kartik Ramachandruni](https://kartikvrama.github.io)'s paper [Personalized Robotic Object Rearrangement from Scene Context](https://arxiv.org/abs/2505.11108) was accepted to the IEEE Conference on Robot and Human Interactive Communication (RO-MAN)."

  - date: July 2025
    content: "[Maithili Patel](https://maithili.github.io)'s paper [ADAPT: Actively Discovering and Adapting to Preferences for any Task](https://openreview.net/pdf?id=Z8vtD1egtI) was accepted to the Conference on Language Modeling (COLM)."

  - date: February 2025
    content: "[Niharika Mathur](https://niharikamathur.com) chaired the CHI 2025 workshop [Technology Mediated Caregiving For Older Adults Aging in Place](https://dl.acm.org/doi/full/10.1145/3706599.3706721)."

  - date: February 2025
    content: "[Maithili Patel](https://maithili.github.io)'s paper [Robot Behavior Personalization From Sparse User Feedback](https://ieeexplore.ieee.org/document/10924711) was accepted to IEEE Robotics and Automation Letters (RAL)."

  - date: January 2025
    content: "[Niharika Mathur](https://niharikamathur.com) presented at [ACM GROUP 2025](https://dl.acm.org/doi/abs/10.1145/3688828.3699640) and won best poster award."

  - date: November 2024
    content: "🎓 Congratulations to [Dr. Kantwon Rogers](https://www.kantwon.com/) who successfully defended his dissertation."

  - date: October 2024
    content: "[Maithili Patel](https://maithili.github.io) gave an invited talk at the [Environment Dynamics Matters](https://edmws.github.io/) workshop at IROS 2024, Abu Dhabi."

  - date: September 2024
    content: "[Ethan Schneider](https://ethannschneider.com)'s paper [CE-MRS: Contrastive Explanations for Multi-Robot Systems](https://ieeexplore.ieee.org/abstract/document/10697262) was accepted for publication in RA-L!"

  - date: August 2023
    content: "[Kartik Ramachandruni](https://kartikvrama.github.io)'s paper [UHTP: A User-Aware Hierarchical Task Planning Framework for Communication-Free, Mutually-Adaptive Human-Robot Collaboration](https://dl.acm.org/doi/pdf/10.1145/3623387) was accepted to the Transactions on ACM Human-Robot Interaction (THRI)."

  - date: June 2023
    content: "[Kartik Ramachandruni](https://kartikvrama.github.io)'s paper [ConSOR: A Context-Aware Semantic Object Rearrangement Framework for Partially Arranged Scenes](https://arxiv.org/abs/2310.00371) was accepted to the IEEE/RSJ International Conference on Intelligent Robots and Systems (IROS)."