recent_news:

  - date: March 2026
    content: "Georgia Tech's College of Computing featured [Niharika Mathur](https://niharikamathur.com)'s research showing that [explainability is a must for older adults to trust AI](https://www.cc.gatech.edu/news/new-study-shows-explainability-must-older-adults-trust-ai). The work will be presented at [CHI 2026](https://chi2026.acm.org/) in Barcelona."

  - date: March 2026
    content: "Lab alumni [Weiyu Liu](http://weiyuliu.com/) and [Joanne Truong](https://www.joannetruong.com/) are part of [Rhoda AI](https://www.rhoda.ai/), a newly launched robotics startup that exited stealth with a [$450M Series A](https://www.reuters.com/technology/rhoda-ai-raises-450-million-17-billion-valuation-unveils-robot-intelligence-2026-03-10/)."

  - date: December 2025
    content: "[Nadira Mahamane](https://nadira.me)'s paper [Older Adult Perspectives on Home Monitoring Robots: User Preferences and Performance of Robot Observation Strategies](https://dl.acm.org/doi/abs/10.1145/3757279.3785612) has been accepted to HRI 2026."

  - date: October 2025
    content: "[Alex Karpekov](https://www.alexkarpekov.com/) presented [VISAR: Visualization and Interpretation of Sensor-based Activity Recognition for Smart Homes](https://dl.acm.org/doi/10.1145/3714394.3756319) at UbiComp 2025."

  - date: February 2025
    content: "[Niharika Mathur](https://niharikamathur.com) chaired the CHI 2025 workshop [Technology Mediated Caregiving For Older Adults Aging in Place](https://dl.acm.org/doi/full/10.1145/3706599.3706721)."

  - date: January 2025
    content: "[Niharika Mathur](https://niharikamathur.com) presented at [ACM GROUP 2025](https://dl.acm.org/doi/abs/10.1145/3688828.3699640) and won best poster award."

  - date: November 2024
    content: "🎓 Congratulations to [Dr. Kantwon Rogers](https://www.kantwon.com/) who successfully defended his dissertation."

  - date: September 2024
    content: "[Ethan Schneider](https://ethannschneider.com)'s paper [CE-MRS: Contrastive Explanations for Multi-Robot Systems](https://ieeexplore.ieee.org/abstract/document/10697262) has been accepted for publication in RA-L!"
