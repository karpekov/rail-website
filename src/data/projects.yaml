# - venue:               REQUIRED - Conference or Journal name (ideally, abbreviated) + year. E.g.: [RAS'23, CoRL'22, IJRR'22]
# - year:                REQUIRED - Year of publication (e.g., 2024)
# - image:               REQUIRED - Figure 1, or any other catchy image of your project.
# - team:                REQUIRED - Full author list, organized as a comma-separated list with first+last names.
# - tags:                REQUIRED - List of project tags; select one or multiple from this list:
#                                   - hcai: Human-Centered AI
#                                   - robo: Robotics
#                                   - multi: Multi-Agent Systems
#                                   - xai: Explainable AI
# - website:             OPTIONAL - Link to the project website.
# - pdf:                 OPTIONAL - Link to the paper or project.
# - github:              OPTIONAL - Link to the github repository.
# - video:               OPTIONAL - Link to the video of the project.
# - featured:            OPTIONAL - Leave "true" if you want to highlight this project on the home page.

